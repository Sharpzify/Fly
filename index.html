<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeForce NOW</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
    }
    .card {
      text-align: center;
      padding: 48px 40px;
    }
    .logo {
      width: 72px; height: 72px;
      background: #76b900;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .logo svg { width: 40px; height: 40px; fill: #000; }
    h1 {
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    p {
      color: #888;
      font-size: 15px;
      margin-bottom: 32px;
    }
    a.btn {
      display: inline-block;
      background: #76b900;
      color: #000;
      font-weight: 700;
      font-size: 16px;
      padding: 14px 36px;
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.2s, box-shadow 0.2s;
    }
    a.btn:hover {
      background: #8fd400;
      box-shadow: 0 0 24px rgba(118,185,0,0.4);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M13 3L4 14h7l-1 7 9-11h-7l1-7z"/></svg>
    </div>
    <h1>GeForce NOW</h1>
    <p>Click below to launch GeForce NOW in your browser.</p>
    <a class="btn" href="https://play.geforcenow.com/mall/" target="_blank">Launch GeForce NOW</a>
  </div>
</body>
</html>
